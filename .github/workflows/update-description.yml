name: Update repo description on release

on:
  release:
    types: [published]

jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - name: Set repo description to latest release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              description: `SilentFlow ${context.payload.release.tag_name} — Local video & audio downloader`
            });
